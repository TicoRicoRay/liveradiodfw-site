name: Rebuild Shows

on:
  schedule:
    - cron: '5 6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'

      - name: Run show rebuild
        run: python build_shows.py

      - name: Commit changed files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html shows.html past-shows.html shows.json
          git diff --cached --quiet || git commit -m "chore: auto-rebuild shows ($(date -u +%Y-%m-%d))"

      - name: Push changes
        run: git push || echo "Nothing to push"
